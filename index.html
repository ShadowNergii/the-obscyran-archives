<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Obscyran Archives</title>
  <style>
    :root {
      --bg: #07080b;
      --panel: rgba(17, 19, 27, 0.82);
      --gold: #d8b46a;
      --parchment: #f4e7c2;
      --muted: #b8a982;
      --resonance: #57b8ff;
      --border: rgba(216, 180, 106, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(87,184,255,0.16), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(216,180,106,0.12), transparent 30rem),
        var(--bg);
      color: var(--parchment);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.6;
    }

    a { color: var(--gold); text-decoration: none; }

    .wrap {
      width: min(1100px, 92%);
      margin: auto;
    }

    header {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4rem 1rem;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle, black, transparent 72%);
    }

    .hero {
      position: relative;
      border: 1px solid var(--border);
      background: rgba(7,8,11,0.72);
      padding: 3rem 2rem;
      border-radius: 24px;
      box-shadow: 0 0 80px rgba(87,184,255,0.09);
    }

    .sigil {
      color: var(--resonance);
      letter-spacing: .35rem;
      font-size: .8rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(2.6rem, 7vw, 5.8rem);
      line-height: 1;
      margin: 0;
      letter-spacing: .08em;
      color: var(--gold);
    }

    .subtitle {
      font-size: clamp(1.05rem, 2.2vw, 1.45rem);
      color: var(--muted);
      margin: 1.5rem auto 0;
      max-width: 720px;
    }

    .quote {
      margin-top: 2rem;
      font-style: italic;
      color: var(--parchment);
    }

    .button {
      display: inline-block;
      margin-top: 2rem;
      padding: .9rem 1.35rem;
      border: 1px solid var(--gold);
      border-radius: 999px;
      color: var(--parchment);
      background: rgba(216,180,106,0.1);
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .78rem;
    }

    section {
      padding: 5rem 0;
    }

    .section-title {
      color: var(--gold);
      font-size: 2rem;
      margin-bottom: .5rem;
    }

    .section-intro {
      color: var(--muted);
      max-width: 760px;
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
    }

    .card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 18px;
      padding: 1.35rem;
      min-height: 170px;
    }

    .card h3 {
      color
